name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      CRITICAL_COVERAGE_MIN: "80"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest httpx pytest-cov ruff mypy vcrpy
      - name: Lint
        run: ruff check .
      - name: Type check
        run: mypy src
      - name: Run backend tests with baseline coverage gate
        run: pytest -q tests
      - name: Enforce critical module coverage gate
        run: |
          pytest -q tests -o addopts="" \
            --cov=src/services \
            --cov=src/security \
            --cov=src/analyzers \
            --cov=src/reports \
            --cov-report=term-missing \
            --cov-report=xml:coverage-critical.xml \
            --cov-fail-under=${CRITICAL_COVERAGE_MIN}
      - name: Upload critical coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-critical-xml
          path: coverage-critical.xml
      - name: Run contract tests (VCR)
        run: pytest -q tests/contract -o addopts=""

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        run: npm --prefix frontend ci
      - name: Build frontend
        run: npm --prefix frontend run build
      - name: Run frontend tests (if present)
        run: npm --prefix frontend run test --if-present
