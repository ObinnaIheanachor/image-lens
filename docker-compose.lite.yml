services:
  api:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite:///./app.db}
      STORAGE_DIR: ${STORAGE_DIR:-./data/storage}
      QUEUE_BACKEND: inmemory
      OBJECT_STORE_BACKEND: local
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./:/app
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload

  webhook-echo:
    image: mendhak/http-https-echo:35
    ports:
      - "${WEBHOOK_ECHO_PORT:-8888}:8080"
