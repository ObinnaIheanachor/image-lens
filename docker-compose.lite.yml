services:
  api:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite:///./app.db}
      STORAGE_DIR: ${STORAGE_DIR:-./data/storage}
      QUEUE_BACKEND: inmemory
      OBJECT_STORE_BACKEND: local
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./:/app
    command: sh -c "alembic upgrade head && uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload"

  webhook-echo:
    image: mendhak/http-https-echo:35
    ports:
      - "${WEBHOOK_ECHO_PORT:-8888}:8080"

  frontend:
    image: node:20-alpine
    working_dir: /app
    env_file:
      - .env
    environment:
      VITE_API_BASE_URL: http://localhost:${API_PORT:-8000}
      VITE_DEFAULT_API_KEY: ${API_KEY}
      VITE_ENABLE_DEV_CONTROLS: "true"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port ${FRONTEND_PORT:-5173}"
    volumes:
      - ./frontend:/app
    ports:
      - "${FRONTEND_PORT:-5173}:${FRONTEND_PORT:-5173}"
    depends_on:
      - api
