services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: image_insight
      POSTGRES_PASSWORD: image_insight
      POSTGRES_DB: image_insight
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data

  webhook-echo:
    image: mendhak/http-https-echo:35
    ports:
      - "${WEBHOOK_ECHO_PORT:-8888}:8080"

  api:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://image_insight:image_insight@postgres:5432/image_insight
      QUEUE_BACKEND: rq
      REDIS_URL: redis://redis:6379/0
      OBJECT_STORE_BACKEND: minio
      MINIO_ENDPOINT: minio:9000
      MINIO_BUCKET: image-insight
      MINIO_SECURE: "false"
    ports:
      - "${API_PORT:-8000}:8000"
    command: sh -c "alembic upgrade head && uvicorn src.main:app --host 0.0.0.0 --port 8000"
    depends_on:
      - postgres
      - redis
      - minio
      - webhook-echo

  worker:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://image_insight:image_insight@postgres:5432/image_insight
      QUEUE_BACKEND: rq
      REDIS_URL: redis://redis:6379/0
      OBJECT_STORE_BACKEND: minio
      MINIO_ENDPOINT: minio:9000
      MINIO_BUCKET: image-insight
      MINIO_SECURE: "false"
    command: python -m src.worker
    depends_on:
      - api

  frontend:
    image: node:20-alpine
    working_dir: /app
    env_file:
      - .env
    environment:
      VITE_API_BASE_URL: http://localhost:${API_PORT:-8000}
      VITE_DEFAULT_API_KEY: ${API_KEY}
      VITE_ENABLE_DEV_CONTROLS: "true"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port ${FRONTEND_PORT:-5173}"
    volumes:
      - ./frontend:/app
    ports:
      - "${FRONTEND_PORT:-5173}:${FRONTEND_PORT:-5173}"
    depends_on:
      - api

volumes:
  pg_data:
  minio_data:
